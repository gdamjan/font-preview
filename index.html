<!DOCTYPE html>
<html lang="mk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Font Preview</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, sans-serif;
    background: #1a1a2e;
    color: #e0e0e0;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem;
  }
  h1 { margin-bottom: 1rem; font-size: 1.6rem; color: #e8e8ff; }

  #drop-zone {
    width: 100%;
    max-width: 800px;
    border: 3px dashed #555;
    border-radius: 12px;
    padding: 3rem 2rem;
    text-align: center;
    transition: border-color 0.2s, background 0.2s;
    cursor: pointer;
    margin-bottom: 1.5rem;
    background: rgba(255,255,255,0.03);
  }
  #drop-zone.hover {
    border-color: #7b68ee;
    background: rgba(123,104,238,0.08);
  }
  #drop-zone p { font-size: 1.1rem; color: #aaa; }
  #drop-zone .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }

  #font-info {
    max-width: 800px;
    width: 100%;
    margin-bottom: 1rem;
    font-size: 0.95rem;
    color: #aaa;
  }

  #controls {
    max-width: 800px;
    width: 100%;
    display: none;
    gap: 1rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  #controls label { font-size: 0.9rem; color: #ccc; }
  #controls input[type="number"], #controls input[type="text"] {
    background: #2a2a3e;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  #controls input[type="number"] { width: 70px; }
  #controls input[type="text"] { width: 100%; flex: 1; min-width: 200px; }
  #controls select {
    background: #2a2a3e;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    font-size: 0.9rem;
  }
  #copy-btn {
    background: #2a2a3e;
    border: 1px solid #444;
    color: #e0e0e0;
    padding: 0.4rem 0.8rem;
    border-radius: 6px;
    font-size: 0.9rem;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
  }
  #copy-btn:hover { background: #3a3a5e; }
  #copy-btn.copied { background: #2e7d32; border-color: #4caf50; }

  #canvas-wrap {
    max-width: 800px;
    width: 100%;
    background: #fff;
    border-radius: 8px;
    overflow: auto;
    display: none;
  }
  canvas { display: block; }

  .hidden { display: none !important; }
</style>
</head>
<body>

<h1>🔤 Font Preview</h1>

<div id="drop-zone">
  <div class="icon">📂</div>
  <p>Drop a <strong>.ttf</strong> or <strong>.otf</strong> font file here</p>
  <p style="font-size:0.85rem;margin-top:0.5rem;color:#777">or click to browse</p>
  <input type="file" id="file-input" accept=".ttf,.otf,.woff,.woff2" hidden>
</div>

<div id="font-info"></div>

<div id="controls">
  <label>Size:
    <input type="number" id="font-size" value="48" min="8" max="200">
  </label>
  <label>Preset:
    <select id="char-preset">
      <option value="cyrillic-mk">Cyrillic (б в г д ѓ п т з к ѐ ѝ)</option>
      <option value="cyrillic-all">Cyrillic (all)</option>
      <option value="latin">Latin (ASCII 32–126)</option>
      <option value="upper">Uppercase A–Z</option>
      <option value="lower">Lowercase a–z</option>
      <option value="digits">Digits 0–9</option>
      <option value="punctuation">Punctuation</option>
      <option value="extended">Latin Extended (32–255)</option>
      <option value="custom">Custom…</option>
    </select>
  </label>
  <label>locl:
    <select id="locl-lang">
      <option value="">off</option>
    </select>
  </label>
  <label style="flex:1;display:none" id="custom-label">Characters:
    <input type="text" id="custom-chars" placeholder="Type characters to preview">
  </label>
  <button id="copy-btn" title="Copy image to clipboard">📋 Copy</button>
</div>

<div id="canvas-wrap">
  <canvas id="preview"></canvas>
</div>

<script src="lib/hb.js"></script>
<script src="lib/hbjs.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
